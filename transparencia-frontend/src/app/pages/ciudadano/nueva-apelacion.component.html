<div class="min-h-screen bg-[#F8F9FB] p-6">
  <div class="max-w-3xl mx-auto">
    <div class="mb-4">
      <a routerLink="/ciudadano" class="text-sm text-gray-600">← Volver al Dashboard</a>
    </div>

    <div *ngIf="loadingSolicitud()" class="p-6 bg-white rounded shadow text-center">Cargando...</div>

    <div *ngIf="modoSeleccion() && !solicitud()" class="space-y-4">
      <h2 class="text-lg font-semibold">Expedientes Apelables</h2>
      <div *ngIf="error()" class="text-sm text-red-600">{{ error() }}</div>
      <div *ngIf="solicitudesApelables().length === 0" class="text-sm text-gray-500">No hay expedientes apelables.</div>
      <ul class="space-y-2">
        <li *ngFor="let s of solicitudesApelables()" class="p-3 bg-white rounded border flex justify-between items-center">
          <div>
            <div class="text-sm font-mono">{{ s.expediente }}</div>
            <div class="text-xs text-gray-500">{{ s.entidadNombre }} — {{ s.asunto }}</div>
          </div>
          <button (click)="seleccionarSolicitud(s)" class="px-3 py-1 bg-[#C8102E] text-white rounded">Seleccionar</button>
        </li>
      </ul>
    </div>

    <div *ngIf="solicitud()" class="space-y-4">
      <h2 class="text-xl font-semibold">Apelar: {{ solicitud()!.expediente }}</h2>

      <div *ngIf="error()" class="text-sm text-red-600">{{ error() }}</div>
      <div *ngIf="mensaje()" class="text-sm text-green-600">{{ mensaje() }}</div>

      <div class="bg-white rounded p-4">
        <label class="block text-sm font-medium">Fundamentos</label>
        <textarea [(ngModel)]="fundamentos" rows="6" class="w-full mt-2 p-2 border rounded"></textarea>
      </div>

      <div class="flex gap-3">
        <button (click)="crearApelacion()" [disabled]="loading()" class="px-4 py-2 bg-[#C8102E] text-white rounded">Presentar Apelación</button>
        <button (click)="volverASeleccion()" class="px-4 py-2 border rounded">Volver</button>
      </div>
    </div>
  </div>
</div>
