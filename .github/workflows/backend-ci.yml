name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'transparencia-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'transparencia-backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: transparencia-backend

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Build
        run: ./mvnw -B compile -DskipTests

      - name: Run tests
        run: ./mvnw -B test

      - name: Package (verify)
        run: ./mvnw -B package -DskipTests

      # OpenAPI spec — exportar para consumidores frontend
      - name: Generate OpenAPI spec
        run: |
          ./mvnw -B spring-boot:start -Dspring-boot.run.profiles=ci 2>/dev/null &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/v3/api-docs > /dev/null 2>&1; then
              curl -s http://localhost:8080/v3/api-docs | python3 -m json.tool > openapi.json
              echo "OpenAPI spec generated successfully"
              break
            fi
            sleep 2
          done
          kill $SERVER_PID 2>/dev/null || true
        continue-on-error: true

      - name: Upload OpenAPI spec
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: actions/upload-artifact@v7
        with:
          name: openapi-spec
          path: transparencia-backend/openapi.json
          retention-days: 30
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: transparencia-backend/target/surefire-reports/
          retention-days: 7
