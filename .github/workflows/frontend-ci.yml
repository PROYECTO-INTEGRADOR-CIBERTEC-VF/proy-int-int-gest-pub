name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'transparencia-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'transparencia-frontend/**'
      - '.github/workflows/frontend-ci.yml'

defaults:
  run:
    working-directory: transparencia-frontend

jobs:
  build-and-test:
    name: Build & Test (Angular 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: transparencia-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint TypeScript (compile check)
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --watch=false

      - name: Build (production)
        run: npm run build
